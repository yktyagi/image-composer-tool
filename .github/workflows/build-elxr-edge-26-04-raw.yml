name: Build ELXR Edge 26.04 Raw Image
on:
  workflow_dispatch:             # Manual runs
    inputs:
      ref:
        description: "Branch or SHA to test (e.g. feature/x or a1b2c3)"
        required: false
      run_qemu_test:
        description: "Run QEMU boot test after build"
        required: false
        default: "false"
        type: choice
        options:
        - "true"
        - "false"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-elxr-edge-26-04-raw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Install Earthly
        uses: earthly/actions-setup@43211c7a0eae5344d6d79fb4aaf209c8f8866203 #v1.0.13
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: "latest"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf tree jq systemd-ukify mmdebstrap systemd-boot

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version: stable

      - name: Prepare build script
        run: |
          if [ ! -f scripts/build_elxr-edge-26.04_raw.sh ]; then
            echo "scripts/build_elxr-edge-26.04_raw.sh not found!"
            exit 1
          fi
          chmod +x scripts/build_elxr-edge-26.04_raw.sh

      - name: Run ELXR Edge 26.04 Raw Image Build
        env:
          RUN_QEMU_TEST: ${{ github.event.inputs.run_qemu_test }}
        run: |
          echo "Starting ELXR Edge 26.04 raw image build..."
          # Ensure script has access to docker group for Earthly
          sudo usermod -aG docker $USER
          
          # Prepare arguments with input validation
          ARGS=""
          case "${RUN_QEMU_TEST}" in
            "true")
              ARGS="--qemu-test"
              echo "QEMU boot test will be run after build"
              ;;
            "false"|"")
              echo "QEMU boot test will be skipped"
              ;;
            *)
              echo "Invalid input for run_qemu_test: ${RUN_QEMU_TEST}"
              exit 1
              ;;
          esac
          
          # Run the ELXR Edge 26.04 raw image build script
          ./scripts/build_elxr-edge-26.04_raw.sh $ARGS
          echo "ELXR Edge 26.04 raw image build completed."
