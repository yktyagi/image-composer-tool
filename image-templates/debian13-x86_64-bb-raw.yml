# AI-searchable metadata for template discovery
metadata:
  description: Debian 13 minimal raw image with initrd hello hook via initramfs-tools (GRUB)
  use_cases:
    - Validating custom initramfs-tools scripts on Debian GRUB raw images
    - Lightweight Debian with early-boot initrd marker
  keywords:
    - bb
    - initramfs-tools
    - initrd
    - hello
    - debian
    - grub
    - raw

image:
  name: bb-os-image-debian
  version: "13.0"

target:
  os: debian
  dist: debian13
  arch: x86_64
  imageType: raw

disk:
  name: Minimal_Raw # 1:1 mapping to the systemConfigs name
  artifacts:
    -
      type: raw  # image file format, valid value [raw, vhd, vhdx, qcow2, vmdk, vdi]
      compression: gz # image compression format (optional)
    - type: vhdx
  size: 4GiB # 4G, 4GB, 4096 MiB also valid. (Required for raw)
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions: # Required for raw, optional for ISO, not needed for rootfs.
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077

    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: "0"
      fsType: ext4
      mountPoint: /
      mountOptions: defaults

systemConfig:
  name: bb
  description: Minimal debian raw image with initrd hello (initramfs-tools, GRUB)

  bootloader:
    bootType: efi
    provider: grub

  immutability:
    enabled: false

  packages:
    - apparmor
    - apt-listchanges
    - apt-utils
    - bash-completion
    - bind9-host
    - cloud-init
    - cloud-initramfs-growroot
    - curl
    - dbus
    - dosfstools
    - firmware-intel-graphics
    - firmware-intel-misc
    - firmware-iwlwifi
    - grub-cloud-amd64
    - init
    - initramfs-tools
    - iptables
    - iputils-ping
    - less
    - libext2fs2t64
    - liblastlog2-2
    - libnss-myhostname
    - libnss-resolve
    - libpam-modules-bin
    - libpam-systemd
    - libss2
    - linux-sysctl-defaults
    - man-db
    - manpages
    - mawk
    - nano
    - netplan.io
    - pciutils
    - polkitd
    - psmisc
    - python3-minimal
    - reportbug
    - wireless-regdb
    - screen
    - socat
    - ssh-import-id
    - sudo
    - tcpdump
    - traceroute
    - unattended-upgrades
    - uuid-runtime
    - vim
    - vim-tiny
    - whiptail
    - zstd

  additionalFiles:
    - local: additionalfiles/debian13-bb/hello.sh
      final: /usr/local/sbin/hello.sh
    - local: additionalfiles/debian13-bb/hooks/hello
      final: /etc/initramfs-tools/hooks/hello
    - local: additionalfiles/debian13-bb/scripts/init-bottom/hello
      final: /etc/initramfs-tools/scripts/init-bottom/hello

  configurations:
    - cmd: "chmod 755 /usr/local/sbin/hello.sh /etc/initramfs-tools/hooks/hello /etc/initramfs-tools/scripts/init-bottom/hello"

  kernel:
    version: "6.12.74"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7"
    packages:
      - linux-image-amd64
