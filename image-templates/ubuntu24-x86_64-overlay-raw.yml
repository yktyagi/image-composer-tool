# AI-searchable metadata for template discovery
metadata:
  description: Overlay an existing Ubuntu 24.04 RAW image, adding a package without rebuilding from scratch
  use_cases:
    - Add packages to a pre-built Ubuntu base image
    - Incremental/overlay image customization
    - Fast iteration on an existing golden image
  keywords:
    - overlay
    - baseline
    - additive
    - ubuntu
    - raw
    - incremental

image:
  name: ubuntu-overlay-tree
  version: "24.04"

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: raw

# Overlay mode: layer packages onto an existing baseline RAW image instead of
# building from scratch. The source image is copied into the build workspace
# first and is never modified in place.
baseline:
  mode: overlay
  source:
    # Path to your pre-built baseline RAW image. Replace with the absolute path
    # to your own image (a remote image may instead be given via `url:`).
    path: /path/to/your/ubuntu-24.04-baseline.img
    format: raw

# Overlay is strictly additive in v1: packages may only be added, never removed
# or downgraded, and any conflict fails the preflight gate.
overlayPolicy:
  packageOperation: additive-only
  conflictPolicy: fail

systemConfig:
  name: overlay
  description: Ubuntu 24.04 baseline with tree overlaid

  # Additive overlay packages. These (and their transitive dependencies not
  # already present in the baseline) are resolved, downloaded, and installed
  # into the baseline. The bootloader and kernel are left untouched.
  #
  # 'tree' was confirmed absent from this baseline's dpkg database; its only
  # dependency (libc6) is already present, so the overlay adds exactly one
  # package — a clean, minimal test of the additive flow.
  packages:
    - tree
