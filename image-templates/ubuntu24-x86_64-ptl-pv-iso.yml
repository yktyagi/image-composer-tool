# AI-searchable metadata for template discovery
metadata:
  description: Ubuntu 24.04 PTL PV attended ISO installer with Intel GPU/NPU support and interactive disk selection
  use_cases:
    - Attended bare metal installation on Intel PTL platforms
    - PTL platform validation and fleet provisioning
    - Interactive install target selection with Intel GPU/NPU enablement
  keywords:
    - iso
    - ubuntu
    - attended
    - installer
    - manual-disk-selection
    - ptl
    - pv
    - intel
    - gpu
    - npu

image:
  name: ptl-pv-ubuntu-iso
  version: "24.04"

target:
  os: ubuntu
  dist: ubuntu24
  arch: x86_64
  imageType: iso # Image type, valid value: [raw, iso].

disk:
  name: ptl-pv-ubuntu-iso
  # Keep path empty so the live installer prompts for interactive disk selection.
  path: ""
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions:
    - id: EFI
      name: EFI
      type: esp
      typeUUID: c12a7328-f81f-11d2-ba4b-00a0c93ec93b
      fsType: vfat
      start: 1MiB
      end: 1025MiB
      mountPoint: /boot/efi
      mountOptions: defaults
      flags:
        - boot
        - esp

    - id: SWAP
      name: SWAP
      type: linux-swap
      typeUUID: 0657fd6d-a4ab-43c4-84e5-0933c84b4f4f
      fsType: linux-swap
      start: 1025MiB
      end: 3073MiB
      mountPoint: none
      mountOptions: sw
      flags: []

    - id: ROOT
      name: ROOT
      type: linux-root-amd64
      typeUUID: 4f68bce3-e8cd-4db1-96e7-fbcaf984b709
      fsType: ext4
      start: 3073MiB
      end: "0" # 0 means use the rest of the disk space
      mountPoint: /
      mountOptions: defaults
      flags: []

# Additional package repositories for this image
packageRepositories:
  # local repository for extra .deb files
  - codename: "localdeb"
    packages:
      - "https://github.com/intel/intel-graphics-compiler/releases/download/v2.20.3/intel-igc-core-2_2.20.3+19972_amd64.deb"
      - "https://github.com/intel/intel-graphics-compiler/releases/download/v2.20.3/intel-igc-opencl-2_2.20.3+19972_amd64.deb"
      - "https://github.com/intel/compute-runtime/releases/download/25.40.35563.4/intel-ocloc_25.40.35563.4-0_amd64.deb"
      - "https://github.com/intel/compute-runtime/releases/download/25.40.35563.4/intel-opencl-icd_25.40.35563.4-0_amd64.deb"
      - "https://github.com/intel/compute-runtime/releases/download/25.40.35563.4/libze-intel-gpu1_25.40.35563.4-0_amd64.deb"
      - "https://github.com/oneapi-src/level-zero/releases/download/v1.22.4/level-zero_1.22.4+u24.04_amd64.deb"
      - "https://github.com/oneapi-src/level-zero/releases/download/v1.22.4/level-zero-devel_1.22.4+u24.04_amd64.deb"
      - "https://github.com/intel/linux-npu-driver/releases/download/v1.28.0/linux-npu-driver-v1.28.0.20251218-20347000698-ubuntu2404.tar.gz"
    pkey: "[trusted=yes]"
    insecureSkipVerify: true # Skip TLS cert verification for hosts with self-signed certs
    component: "main"
  # Intel overlay repository (aligned with installer script)
  - codename: "noble"
    url: "https://download.01.org/intel-linux-overlay/ubuntu"
    pkey: "https://download.01.org/intel-linux-overlay/ubuntu/E6FA98203588250569758E97D176E3162086EE4C.gpg"
    component: "multimedia main non-free kernels"
    priority: 2000
