systemConfig:
  name: ptl-pv-ubuntu-iso
  description: PTL PV Ubuntu image for attended ISO installation

  initramfs:
    template: default-initrd-x86_64.yml

  bootloader:
    bootType: efi
    provider: grub

  immutability:
    enabled: false

  hostname: ubuntu24-ptl-pv

  # Declarative network configuration
  # network:
  #   backend: systemd-networkd
  #   interfaces:
  #     # Primary interface with DHCP
  #     - name: enp1s0
  #       dhcp4: true

  #     # Secondary interface with static IP
  #     - name: enp2s0
  #       addresses:
  #         - "10.0.0.100/24"
  #       routes:
  #         - to: default
  #           via: "10.0.0.1"
  #       nameservers:
  #         - "8.8.8.8"
  #         - "8.8.4.4"

  kernel:
    version: "260128t080735z-r2"
    cmdline: "xe.max_vfs=7 xe.force_probe=* modprobe.blacklist=i915 udmabuf.list_limit=8192 console=ttyS0,115200 console=tty0 loglevel=7 systemd.log_level=debug"
    enableExtraModules: "intel_vpu uas"
    packages:
      - linux-image-6.17-intel_260128t080735z-r2
      - linux-headers-6.17-intel_260128t080735z-r2

