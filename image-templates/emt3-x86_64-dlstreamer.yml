# AI-searchable metadata for template discovery
metadata:
  description: "Edge Microvisor Toolkit 3 image with Intel DL Streamer for AI video analytics and deep learning inference at the edge"
  use_cases:
    - "video analytics"
    - "AI inference"
    - "deep learning"
    - "computer vision"
    - "media processing"
  keywords:
    - dlstreamer
    - ai
    - inference
    - video
    - analytics
    - deep-learning
    - opencv
    - gstreamer
    - emt3
    - microvisor

image:
  name: emt3-x86_64-dlstreamer
  version: "1.0.0"

target:
  os: edge-microvisor-toolkit # Target OS name
  dist: emt3 # Target OS distribution
  arch: x86_64 # Target OS architecture
  imageType: raw # Image type, valid value: [raw, iso].

# Additional package repositories for this image
# Sample list of additional package repositories; replace codename, url, and pkey values as needed
packageRepositories:
  - codename: "EdgeAI"
    url: "https://yum.repos.intel.com/edgeai/"
    pkey: "https://yum.repos.intel.com/edgeai/GPG-PUB-KEY-INTEL-DLS.gpg" # Uncomment and replace in real config

  - codename: "OpenVINO"
    url: "https://yum.repos.intel.com/openvino/"
    pkey: "https://yum.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB" # Uncomment and replace in real config

  - codename: "mariner"
    url: "https://packages.microsoft.com/yumrepos/cbl-mariner-2.0-prod-extended-x86_64/"
    pkey: "https://packages.microsoft.com/azurelinux/3.0/prod/base/x86_64/repodata/repomd.xml.key" # Uncomment and replace in real config

disk:
  name: Minimal_Raw # 1:1 mapping to the systemConfigs name
  artifacts:
    -
      type: raw  # image file format, valid value [raw, vhd, vhdx, qcow2, vmdk, vdi]
      compression: gz # image compression format (optional)
  size: 8GiB # 4G, 4GB, 4096 MiB also valid. (Required for raw)
  partitionTableType: gpt # Partition table type, valid value: [gpt, mbr]
  partitions: # Required for raw, optional for ISO, not needed for rootfs.
    - id: boot
      type: esp
      flags:
        - esp
        - boot
      start: 1MiB
      end: 513MiB
      fsType: fat32
      mountPoint: /boot/efi
      mountOptions: umask=0077

    - id: rootfs
      type: linux-root-amd64
      start: 513MiB
      end: "0"
      fsType: ext4
      mountPoint: /
      mountOptions: defaults

systemConfig:
  name: Minimal_Raw
  description: dlstreamer yml configuration for raw image

  bootloader:
    bootType: efi # (efi or legacy)
    provider: systemd-boot # (grub for efi and legacy mode, or systemd-boot for efi mode)

  immutability:
    enabled: false # default is true

  packages:
    # ssh server
    - openssh-server

    # virtualization host
    - qemu-kvm

    # agent packages
    - hardware-discovery-agent
    - cluster-agent
    - node-agent
    - platform-observability-agent
    - platform-telemetry-agent
    - platform-update-agent
    - in-band-manageability
    - reporting-agent

    # tinker tools
    - gptfdisk
    - cloud-init
    - cloud-utils-growpart
    - tpm2-tools
    - lvm2
    - netplan
    - efibootmgr
    - unzip
    - rsyslog
    - tpm2-initramfs-tool
    - veritysetup
    - python3-pyserial

    # persistent mount
    - rsync

    # selinux full
    - selinux-policy
    - selinux-policy-devel
    - policycoreutils-python-utils
    - checkpolicy
    - secilc
    - setools-console

    # intel gpu base
    #- kernel-drivers-gpu
    - linux-firmware-i915
    - linux-firmware-ice
    - intel-npu-firmware

    # intel wireless
    - linux-firmware-iwlwifi
    - wireless-regdb

    # os update
    - os-update

    # vpro amt
    - platform-manageability-agent
    - rpc
    - intel-lms

    # docker
    - moby-engine
    - docker-cli
    - docker-compose

    # dl streamer packages
    - tdnf
    - curl
    - nano
    - paho-mqtt-c
    - ffmpeg
    - opencv
    - intel-dlstreamer-2026.0.0
    - openvino-2026.0.0

  # Kernel Configuration
  kernel:
    version: "6.12"
    cmdline: "console=ttyS0,115200 console=tty0 loglevel=7 i915.force_probe=*"
    packages:
      - kernel-drivers-gpu-6.12.55
